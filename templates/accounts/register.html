{% extends "base.html" %}
{% block title %}Ro'yxatdan o'tish{% endblock %}

{% block content %}
<section style="padding:120px 0 60px;min-height:100vh;display:flex;align-items:center;justify-content:center">
  <div style="width:100%;max-width:420px;padding:0 20px">
    <div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:24px;padding:40px;text-align:center">
      <div style="font-size:2.5rem;margin-bottom:12px"><i class="fa-solid fa-gamepad"></i></div>
      <h1 style="font-family:'Orbitron',sans-serif;font-size:1.5rem;margin-bottom:8px">Ro'yxatdan o'tish</h1>
      <p style="color:#888;font-size:0.88rem;margin-bottom:32px">NexGear'ga qo'shiling!</p>

      <form method="post">
        {% csrf_token %}
        <div style="margin-bottom:16px;text-align:left">
          <label style="font-size:0.82rem;color:#888;display:block;margin-bottom:6px">Username *</label>
          <input type="text" name="username" required
            style="width:100%;background:#111;border:1px solid #2a2a2a;border-radius:10px;padding:12px 16px;color:#fff;font-size:0.95rem;outline:none"
            onfocus="this.style.borderColor='#44d62c'" onblur="this.style.borderColor='#2a2a2a'">
        </div>
        <div style="margin-bottom:16px;text-align:left">
          <label style="font-size:0.82rem;color:#888;display:block;margin-bottom:6px">Email *</label>
          <input type="email" name="email" required
            style="width:100%;background:#111;border:1px solid #2a2a2a;border-radius:10px;padding:12px 16px;color:#fff;font-size:0.95rem;outline:none"
            onfocus="this.style.borderColor='#44d62c'" onblur="this.style.borderColor='#2a2a2a'">
        </div>
        <div style="margin-bottom:16px;text-align:left">
          <label style="font-size:0.82rem;color:#888;display:block;margin-bottom:6px">Telefon</label>
          <input type="text" name="phone" placeholder="+998 90 123 45 67"
            style="width:100%;background:#111;border:1px solid #2a2a2a;border-radius:10px;padding:12px 16px;color:#fff;font-size:0.95rem;outline:none"
            onfocus="this.style.borderColor='#44d62c'" onblur="this.style.borderColor='#2a2a2a'">
        </div>
        <div style="margin-bottom:16px;text-align:left">
          <label style="font-size:0.82rem;color:#888;display:block;margin-bottom:6px">Parol *</label>
          <input type="password" name="password" required
            style="width:100%;background:#111;border:1px solid #2a2a2a;border-radius:10px;padding:12px 16px;color:#fff;font-size:0.95rem;outline:none"
            onfocus="this.style.borderColor='#44d62c'" onblur="this.style.borderColor='#2a2a2a'">
        </div>
        <div style="margin-bottom:24px;text-align:left">
          <label style="font-size:0.82rem;color:#888;display:block;margin-bottom:6px">Parolni tasdiqlang *</label>
          <input type="password" name="password2" required
            style="width:100%;background:#111;border:1px solid #2a2a2a;border-radius:10px;padding:12px 16px;color:#fff;font-size:0.95rem;outline:none"
            onfocus="this.style.borderColor='#44d62c'" onblur="this.style.borderColor='#2a2a2a'">
        </div>
        <button type="submit"
          style="width:100%;padding:14px;background:#44d62c;color:#000;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer">
          Ro'yxatdan o'tish →
        </button>
      </form>

      <p style="margin-top:24px;color:#888;font-size:0.88rem">
        Hisobingiz bormi? <a href="{% url 'accounts:login' %}" style="color:#44d62c;font-weight:600">Kirish</a>
      </p>
    </div>
  </div>
</section>
{% endblock %}
